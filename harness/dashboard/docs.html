<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MediaOS · Tài liệu</title>
    <style>
      :root {
        --bg: #0b0e14;
        --panel: #131722;
        --panel2: #1b2130;
        --line: #2a3142;
        --txt: #e6edf3;
        --dim: #8b97a8;
        --accent: #38bdf8;
        --red: #e74c3c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--txt);
        font:
          14px/1.5 ui-sans-serif,
          system-ui,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      .mono {
        font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      }
      .muted {
        color: var(--dim);
      }
      .err {
        color: var(--red);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 5;
        background: linear-gradient(180deg, #0d1320, #0b0e14);
        border-bottom: 1px solid var(--line);
        padding: 12px 20px;
      }
      h1 {
        font-size: 17px;
        margin: 0;
      }
      .sub {
        color: var(--dim);
        font-size: 12px;
        margin-top: 2px;
      }
      /* ── nav điều hướng trang (dùng chung 3 trang) ── */
      .nav {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .nav a {
        padding: 5px 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--dim);
        font-size: 13px;
        background: var(--panel);
      }
      .nav a:hover {
        background: var(--panel2);
      }
      .nav a.on {
        color: var(--txt);
        border-color: var(--accent);
        background: var(--panel2);
      }
      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 16px 20px 60px;
      }

      /* ── docs browser ── */
      .docs {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 16px;
        align-items: start;
      }
      .docnav {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
        max-height: 82vh;
        overflow: auto;
        position: sticky;
        top: 84px;
      }
      .docsearch {
        width: 100%;
        padding: 7px 9px;
        margin-bottom: 8px;
        background: #0a0d13;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--txt);
        font: inherit;
      }
      .docnav .grp {
        margin: 4px 0 8px;
      }
      .docnav .gh {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--dim);
        padding: 6px 6px 3px;
        position: sticky;
        top: 0;
        background: var(--panel);
      }
      .docnav a.f {
        display: block;
        padding: 4px 8px;
        border-radius: 6px;
        color: var(--txt);
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .docnav a.f:hover {
        background: var(--panel2);
      }
      .docnav a.f.sel {
        background: var(--accent);
        color: #001018;
      }
      .docview {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 20px 26px;
        min-height: 60vh;
      }

      /* ── rendered markdown ── */
      .docview h1,
      .docview h2,
      .docview h3,
      .docview h4,
      .docview h5,
      .docview h6 {
        color: var(--txt);
        line-height: 1.25;
        margin: 20px 0 8px;
      }
      .docview h1 {
        font-size: 24px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 6px;
      }
      .docview h2 {
        font-size: 20px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 4px;
      }
      .docview h3 {
        font-size: 16px;
      }
      .docview h4 {
        font-size: 14px;
        color: var(--dim);
      }
      .docview p {
        margin: 8px 0;
      }
      .docview code {
        background: #0a0d13;
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 1px 5px;
        font-family: ui-monospace, Consolas, monospace;
        font-size: 12.5px;
      }
      .docview pre.md-pre {
        background: #0a0d13;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        overflow: auto;
      }
      .docview pre.md-pre code {
        border: 0;
        background: none;
        padding: 0;
      }
      .docview table.md-table {
        border-collapse: collapse;
        margin: 12px 0;
        width: 100%;
        font-size: 13px;
      }
      .docview table.md-table th,
      .docview table.md-table td {
        border: 1px solid var(--line);
        padding: 6px 10px;
        text-align: left;
        vertical-align: top;
      }
      .docview table.md-table th {
        background: var(--panel2);
      }
      .docview blockquote {
        border-left: 3px solid var(--accent);
        margin: 10px 0;
        padding: 4px 12px;
        color: var(--dim);
        background: var(--panel2);
        border-radius: 0 8px 8px 0;
      }
      .docview hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 16px 0;
      }
      .docview ul,
      .docview ol {
        margin: 8px 0;
        padding-left: 22px;
      }
      .docview li {
        margin: 3px 0;
      }
      @media (max-width: 760px) {
        .docs {
          grid-template-columns: 1fr;
        }
        .docnav {
          position: static;
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>📚 Tài liệu dự án</h1>
      <div class="sub">
        Duyệt toàn bộ <span class="mono">docs/</span> — SPEC · DB · API · UI · BACKEND · FRONTEND ·
        QA · DEVOPS · IMPLEMENTATION
      </div>
      <nav class="nav">
        <a href="/">📊 Báo cáo</a>
        <a href="/progress">📈 Tiến độ</a>
        <a href="/docs" class="on">📚 Tài liệu</a>
      </nav>
    </header>
    <div class="wrap">
      <div id="root" class="docs"></div>
    </div>

    <script>
      "use strict";
      // el(): tạo phần tử an toàn (tự escape text). Trích từ index.html (cùng triết lý zero-dep).
      function el(tag, attrs, ...kids) {
        const n = document.createElement(tag);
        if (attrs)
          for (const k in attrs) {
            const v = attrs[k];
            if (v == null || v === false) continue;
            if (k === "class") n.className = v;
            else if (k === "style" && typeof v === "object") Object.assign(n.style, v);
            else if (k.startsWith("on") && typeof v === "function")
              n.addEventListener(k.slice(2), v);
            else n.setAttribute(k, v);
          }
        for (const kid of kids.flat()) {
          if (kid == null || kid === false || kid === true) continue;
          n.appendChild(kid instanceof Node ? kid : document.createTextNode(String(kid)));
        }
        return n;
      }

      // ── markdown renderer (zero-dep, an toàn: escape mọi text, chỉ phát tag đã biết) ──
      function escapeHtml(s) {
        return String(s).replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      }
      function mdInline(s) {
        s = escapeHtml(s);
        s = s.replace(/`([^`]+)`/g, (m, p) => "<code>" + p + "</code>");
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
        s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (m, t, u) => {
          const safe = /^(https?:|#|\/|mailto:)/i.test(u) ? u : "#";
          return '<a href="' + escapeHtml(safe) + '" target="_blank" rel="noopener">' + t + "</a>";
        });
        return s;
      }
      function splitRow(line) {
        return line
          .replace(/^\s*\|/, "")
          .replace(/\|\s*$/, "")
          .split("|")
          .map((c) => c.trim());
      }
      function mdToHtml(src) {
        const lines = String(src).replace(/\r\n?/g, "\n").split("\n");
        let html = "",
          i = 0;
        while (i < lines.length) {
          const line = lines[i];
          const fence = line.match(/^```(.*)$/);
          if (fence) {
            i++;
            const buf = [];
            while (i < lines.length && !/^```/.test(lines[i])) {
              buf.push(lines[i]);
              i++;
            }
            i++;
            html += '<pre class="md-pre"><code>' + escapeHtml(buf.join("\n")) + "</code></pre>";
            continue;
          }
          const h = line.match(/^(#{1,6})\s+(.*)$/);
          if (h) {
            html += "<h" + h[1].length + ">" + mdInline(h[2]) + "</h" + h[1].length + ">";
            i++;
            continue;
          }
          if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)) {
            html += "<hr/>";
            i++;
            continue;
          }
          if (/^>\s?/.test(line)) {
            const buf = [];
            while (i < lines.length && /^>\s?/.test(lines[i])) {
              buf.push(lines[i].replace(/^>\s?/, ""));
              i++;
            }
            html += "<blockquote>" + mdInline(buf.join(" ")) + "</blockquote>";
            continue;
          }
          if (
            /\|/.test(line) &&
            i + 1 < lines.length &&
            /^\s*\|?[\s:|-]*-+[\s:|-]*\|?\s*$/.test(lines[i + 1])
          ) {
            const rows = [splitRow(line)];
            i += 2;
            while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim() !== "") {
              rows.push(splitRow(lines[i]));
              i++;
            }
            let t =
              '<table class="md-table"><thead><tr>' +
              rows[0].map((c) => "<th>" + mdInline(c) + "</th>").join("") +
              "</tr></thead><tbody>";
            for (const r of rows.slice(1))
              t += "<tr>" + r.map((c) => "<td>" + mdInline(c) + "</td>").join("") + "</tr>";
            html += t + "</tbody></table>";
            continue;
          }
          if (/^\s*([-*+]|\d+\.)\s+/.test(line)) {
            const ordered = /^\s*\d+\./.test(line);
            const buf = [];
            while (i < lines.length && /^\s*([-*+]|\d+\.)\s+/.test(lines[i])) {
              buf.push(lines[i].replace(/^\s*([-*+]|\d+\.)\s+/, ""));
              i++;
            }
            const tag = ordered ? "ol" : "ul";
            html +=
              "<" +
              tag +
              ">" +
              buf.map((b) => "<li>" + mdInline(b) + "</li>").join("") +
              "</" +
              tag +
              ">";
            continue;
          }
          if (line.trim() === "") {
            i++;
            continue;
          }
          const buf = [line];
          i++;
          while (
            i < lines.length &&
            lines[i].trim() !== "" &&
            !/^(#{1,6}\s|```|>\s?|\s*([-*+]|\d+\.)\s+)/.test(lines[i])
          ) {
            buf.push(lines[i]);
            i++;
          }
          html += "<p>" + mdInline(buf.join("\n")) + "</p>";
        }
        return html;
      }

      // ── docs browser ──────────────────────────────────────────────────────────────
      let docsList = null,
        docSel = null,
        docFilter = "";

      function buildDocNav(container, viewEl) {
        container.textContent = "";
        const q = docFilter.trim().toLowerCase();
        const files = (docsList.files || []).filter((f) => !q || f.path.toLowerCase().includes(q));
        if (!files.length) {
          container.appendChild(
            el("p", { class: "muted", style: { padding: "8px" } }, "Không có tài liệu khớp."),
          );
          return;
        }
        const groups = {};
        for (const f of files) {
          const idx = f.path.indexOf("/");
          const g = idx < 0 ? "(gốc)" : f.path.slice(0, idx);
          (groups[g] = groups[g] || []).push(f);
        }
        for (const g of Object.keys(groups).sort((a, b) => a.localeCompare(b, "vi"))) {
          const box = el(
            "div",
            { class: "grp" },
            el("div", { class: "gh" }, g + " · " + groups[g].length),
          );
          for (const f of groups[g]) {
            const name = f.path.includes("/") ? f.path.slice(f.path.indexOf("/") + 1) : f.path;
            box.appendChild(
              el(
                "a",
                {
                  class: "f" + (docSel === f.path ? " sel" : ""),
                  title: f.path,
                  onclick: () => {
                    docSel = f.path;
                    location.hash = "#" + encodeURIComponent(f.path);
                    buildDocNav(container, viewEl);
                    openDoc(f.path, viewEl);
                  },
                },
                name,
              ),
            );
          }
          container.appendChild(box);
        }
      }

      function openDoc(relPath, viewEl) {
        viewEl.replaceChildren(el("p", { class: "muted" }, "Đang tải " + relPath + "…"));
        fetch("/api/docs/raw?path=" + encodeURIComponent(relPath))
          .then((r) => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.text();
          })
          .then((text) => {
            const ext = (relPath.split(".").pop() || "").toLowerCase();
            const body = el("div");
            if (ext === "md" || ext === "mdx") body.innerHTML = mdToHtml(text);
            else body.appendChild(el("pre", { class: "md-pre" }, el("code", null, text)));
            viewEl.replaceChildren(
              el(
                "div",
                { class: "muted", style: { marginBottom: "10px", fontSize: "12px" } },
                "📄 docs/" + relPath,
              ),
              body,
            );
            viewEl.scrollTop = 0;
          })
          .catch((e) =>
            viewEl.replaceChildren(
              el("p", { class: "err" }, "Lỗi tải tài liệu: " + ((e && e.message) || e)),
            ),
          );
      }

      function boot() {
        const root = document.getElementById("root");
        const nav = el("div", { class: "docnav" });
        const viewEl = el("div", { class: "docview" });
        const navBody = el("div");
        nav.appendChild(
          el("input", {
            class: "docsearch",
            placeholder: "Lọc tài liệu…",
            oninput: (e) => {
              docFilter = e.target.value;
              buildDocNav(navBody, viewEl);
            },
          }),
        );
        nav.appendChild(navBody);
        root.replaceChildren(nav, viewEl);

        // mở tài liệu theo hash (#docs/...) nếu có
        const h = decodeURIComponent((location.hash || "").replace(/^#/, ""));
        if (h) docSel = h;

        const ready = () => {
          buildDocNav(navBody, viewEl);
          if (docSel) openDoc(docSel, viewEl);
          else
            viewEl.appendChild(el("p", { class: "muted" }, "Chọn một tài liệu bên trái để xem."));
        };
        viewEl.appendChild(el("p", { class: "muted" }, "Đang tải danh sách tài liệu…"));
        fetch("/api/docs")
          .then((r) => r.json())
          .then((d) => {
            docsList = d;
            ready();
          })
          .catch((e) =>
            viewEl.replaceChildren(el("p", { class: "err" }, "Lỗi tải /api/docs: " + e)),
          );
      }

      window.addEventListener("hashchange", () => {
        const h = decodeURIComponent((location.hash || "").replace(/^#/, ""));
        if (h && h !== docSel) {
          docSel = h;
          boot();
        }
      });
      boot();
    </script>
  </body>
</html>
