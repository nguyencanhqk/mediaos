components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Access token JWT — `Authorization: Bearer <access_token>` (API-01 §6.2).'
    internalServiceAuth:
      type: apiKey
      in: header
      name: X-Internal-Token
      description: Service-to-service token cho `/internal/v1/*`. Không gọi được từ frontend.

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }
      description: Trang hiện tại (offset pagination).
    PerPageParam:
      name: per_page
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Số bản ghi mỗi trang (tối đa 100).
    SearchParam:
      name: search
      in: query
      required: false
      schema: { type: string }
      description: Từ khóa tìm kiếm (theo field whitelist của module).
    SortParam:
      name: sort
      in: query
      required: false
      schema: { type: string, example: "created_at:desc" }
      description: "Sắp xếp theo field whitelist, dạng `field:asc|desc`."
    CursorParam:
      name: cursor
      in: query
      required: false
      schema: { type: string }
      description: Con trỏ cursor pagination (log/notification).
    LimitParam:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Giới hạn bản ghi (cursor pagination).
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema: { type: string }
      description: ID request từ client để truy vết.
    XClientType:
      name: X-Client-Type
      in: header
      required: false
      schema: { type: string, enum: [web, mobile, system] }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, format: uuid }
      description: Chống xử lý trùng cho API quan trọng (API-01 §21).
    IfMatch:
      name: If-Match
      in: header
      required: false
      schema: { type: string }
      description: Optimistic locking theo version (API-01 §22.1).

  schemas:
    Meta:
      type: object
      properties:
        request_id: { type: string, example: req_20260620_000001 }
        timestamp: { type: string, format: date-time, example: "2026-06-20T10:00:00+07:00" }
        idempotent_replay: { type: boolean }
      required: [request_id, timestamp]
    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        per_page: { type: integer, example: 20 }
        total: { type: integer, example: 100 }
        total_pages: { type: integer, example: 5 }
        has_next: { type: boolean }
        has_prev: { type: boolean }
      required: [page, per_page, total, total_pages, has_next, has_prev]
    CursorPagination:
      type: object
      properties:
        limit: { type: integer, example: 20 }
        next_cursor: { type: string, nullable: true }
        has_next: { type: boolean }
      required: [limit, has_next]
    ValidationFieldError:
      type: object
      properties:
        field: { type: string, example: email }
        message: { type: string, example: Email không đúng định dạng }
        rule: { type: string, example: email }
      required: [field, message, rule]
    ErrorObject:
      type: object
      properties:
        code: { type: string, example: AUTH-ERR-FORBIDDEN }
        type: { type: string, example: ForbiddenError }
        details:
          oneOf:
            - type: object
              nullable: true
            - type: array
              items: { $ref: '#/components/schemas/ValidationFieldError' }
          nullable: true
      required: [code, type]
    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, enum: [true], example: true }
        message: { type: string, example: Thao tác thành công }
        data:
          type: object
          nullable: true
        meta: { $ref: '#/components/schemas/Meta' }
      required: [success, message, data, meta]
    SuccessListResponse:
      type: object
      properties:
        success: { type: boolean, enum: [true], example: true }
        message: { type: string, example: Lấy danh sách thành công }
        data:
          type: array
          items: { type: object }
        pagination: { $ref: '#/components/schemas/Pagination' }
        meta: { $ref: '#/components/schemas/Meta' }
      required: [success, message, data, meta]
    CursorListResponse:
      type: object
      properties:
        success: { type: boolean, enum: [true], example: true }
        message: { type: string }
        data:
          type: array
          items: { type: object }
        pagination: { $ref: '#/components/schemas/CursorPagination' }
        meta: { $ref: '#/components/schemas/Meta' }
      required: [success, data]
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, enum: [false], example: false }
        message: { type: string, example: Bạn không có quyền thực hiện thao tác này }
        error: { $ref: '#/components/schemas/ErrorObject' }
        meta: { $ref: '#/components/schemas/Meta' }
      required: [success, message, error, meta]
    ValidationErrorResponse:
      type: object
      properties:
        success: { type: boolean, enum: [false], example: false }
        message: { type: string, example: Dữ liệu không hợp lệ }
        error:
          type: object
          properties:
            code: { type: string, example: VALIDATION-ERR-001 }
            type: { type: string, example: ValidationError }
            details:
              type: array
              items: { $ref: '#/components/schemas/ValidationFieldError' }
          required: [code, type, details]
        meta: { $ref: '#/components/schemas/Meta' }
      required: [success, message, error, meta]

  responses:
    SuccessObject:
      description: Thành công (object)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessResponse' }
    SuccessList:
      description: Thành công (list có phân trang)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessListResponse' }
    SuccessCursorList:
      description: Thành công (list cursor)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CursorListResponse' }
    Created:
      description: Tạo mới thành công
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessResponse' }
    Accepted:
      description: Đã nhận, xử lý bất đồng bộ
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessResponse' }
    NoContent:
      description: Thành công, không có nội dung
    BadRequest:
      description: Request sai format / validation lỗi
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationErrorResponse' }
    Unauthorized:
      description: Chưa xác thực / token sai / hết hạn
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Đã xác thực nhưng không có quyền / ngoài data scope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Không tìm thấy / user không được phép thấy
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Xung đột trạng thái / trùng dữ liệu / version
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnprocessableEntity:
      description: Đúng format nhưng vi phạm business rule
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    PayloadTooLarge:
      description: File vượt giới hạn dung lượng
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnsupportedMediaType:
      description: MIME type không cho phép
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TooManyRequests:
      description: Rate limit
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServerError:
      description: Lỗi hệ thống
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

paths:
  # =========================================================================
  # AUTH — Session API (login/logout/refresh/password)
  # =========================================================================
  /api/v1/auth/login:
    post:
      tags: [Auth - Session]
      summary: Đăng nhập bằng email và mật khẩu
      operationId: authLogin
      security: []
      x-required-permission: null
      x-allowed-roles: []
      x-data-scope: []
      x-idempotency: "No"
      x-audit-log: always
      x-notification-event: null
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, maxLength: 255 }
                password: { type: string, format: password }
                remember_me: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/SuccessObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/ServerError' }
  /api/v1/auth/refresh-token:
    post:
      tags: [Auth - Session]
      summary: Làm mới access token bằng refresh token
      operationId: authRefreshToken
      security: []
      x-required-permission: null
      x-allowed-roles: []
      x-data-scope: []
      x-idempotency: "No"
      x-audit-log: conditional
      x-notification-event: null
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        '200': { $ref: '#/components/responses/SuccessObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
  /api/v1/auth/logout:
    post:
      tags: [Auth - Session]
      summary: Đăng xuất session hiện tại
      operationId: authLogout
      x-required-permission: null
      x-allowed-roles: []
      x-data-scope: [Own]
      x-idempotency: "Optional"
      x-audit-log: always
      x-notification-event: null
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200': { $ref: '#/components/responses/SuccessObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
  /api/v1/auth/logout-all:
    post:
      tags: [Auth - Session]
      summary: Đăng xuất khỏi tất cả thiết bị
      operationId: authLogoutAll
      x-required-permission: null
      x-allowed-roles: []
      x-data-scope: [Own]
      x-idempotency: "Optional"
      x-audit-log: always
      x-notification-event: null
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                except_current_session: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/SuccessObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth - Session]
      summary: Gửi yêu cầu quên mật khẩu
      operationId: authForgotPassword
      security: []
      x-required-permission: null
      x-allowed-roles: []
      x-data-scope: []
      x-idempotency: "No"
      x-audit-log: conditional
      x-notification-event: AUTH.PASSWORD_RESET_REQUESTED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { $ref: '#/components/responses/SuccessObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/ServerError' }
  /api/v1/auth/reset-password:
    post:
      tags: [Auth - Session]
      summary: Đặt lại mật khẩu bằng reset token
      operationId: authResetPassword
      security: []
      x-required-permission: null
      x-allowed-roles: []
      x-data-scope: []
      x-idempotency: "No"
      x-audit-log: always
      x-notification-event: AUTH.PASSWORD_CHANGED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password, confirm_password]
              properties:
                token: { type: string }
                new_password: { type: string, format: password }
                confirm_password: { type: string, format: password }
      responses:
        '200': { $ref: '#/components/responses/SuccessObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/ServerError' }
  /api/v1/auth/change-password:
    post:
      tags: [Auth - Session]
      summary: Đổi mật khẩu của user hiện tại
      operationId: authChangePassword
      x-required-permission: AUTH.PASSWORD.CHANGE
      x-allowed-roles: [Super Admin, Company Admin, HR, Manager, Employee]
      x-data-scope: [Own]
      x-idempotency: "No"
      x-audit-log: always
      x-notification-event: AUTH.PASSWORD_CHANGED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password, confirm_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password }
                confirm_password: { type: string, format: password }
                logout_other_sessions: { type: boolean }
      responses:
        '200': { $ref: '#/components/responses/SuccessObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/ServerError' }

  # =========================================================================
  # AUTH — Me API (/auth/me/*)
  # =========================================================================
  /api/v1/auth/me:
    get:
      tags: [Auth - Me]
      summary: Lấy thông tin user hiện tại
      operationId: authGetMe
      x-required-permission: null
      x-allowed-roles: []
      x-data-scope: [Own]
      x-idempotency: "No"
      x-audit-log: none
      x-notification-event: null
      responses:
        '200': { $ref: '#/components/responses/SuccessObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
  /api/v1/auth/me/permissions:
    get:
      tags: [Auth - Me]
      summary: Lấy permission hiện tại của user
      operationId: authGetMyPermissions
      x-required-permission: null
      x-allowed-roles: []
      x-data-scope: [Own]
      x-idempotency: "No"
