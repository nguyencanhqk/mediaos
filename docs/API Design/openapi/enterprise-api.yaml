        - { name: dashboard_type, in: query, required: false, schema: { type: string, enum: [Employee, Manager, HR, Admin] } }
        - { name: role_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: user_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: widget_code, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string, enum: [Active, Inactive] } }
