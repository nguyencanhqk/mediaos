openapi: 3.1.0
info:
  title: Enterprise Management System API
  version: 1.0.0
  description: |
    OpenAPI 3.1 cho **Hệ thống Quản lý Doanh nghiệp nội bộ** (MVP).

    Tài liệu này được sinh chuẩn hóa từ API-02 → API-09 theo quy chuẩn API-01.
    Permission/scope tham chiếu [API-10 Permission Matrix](../API-10%20PERMISSION%20MATRIX.md).

    ## Quy ước extension (x-*) cho authorization & hành vi
    Mỗi operation mang metadata phân quyền dưới dạng vendor extension:

    | Extension | Kiểu | Ý nghĩa |
    | --------- | ---- | ------- |
    | `x-required-permission` | string \| string[] | Mã permission bắt buộc. Mảng = nhiều permission. |
    | `x-permission-mode` | `allOf` \| `anyOf` | Cách kết hợp khi là mảng. Mặc định `allOf`. `anyOf` = bất kỳ quyền nào trong mảng. |
    | `x-allowed-roles` | string[] | Role thường dùng (mô tả, không phải nguồn enforce). |
    | `x-data-scope` | string[] | Scope áp dụng: Own/Team/Department/Project/Company/System. |
    | `x-idempotency` | `Required` \| `Optional` \| `No` | Yêu cầu header `Idempotency-Key`. |
    | `x-audit-log` | `always` \| `conditional` \| `none` | Mức ghi audit log. |
    | `x-notification-event` | string \| null | Event code phát ra (nếu có). |

    Public endpoint dùng `security: []`. Internal `/internal/v1/*` dùng `internalServiceAuth`.
  contact:
    name: Enterprise Management System — Backend
  license:
    name: Proprietary

