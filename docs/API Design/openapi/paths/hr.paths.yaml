      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, department_id, position_id, joined_date, employment_status]
              properties:
                employee_code: { type: string, nullable: true }
                full_name: { type: string }
                gender: { type: string }
                date_of_birth: { type: string, format: date }
                personal_email: { type: string, format: email }
                company_email: { type: string, format: email }
                phone: { type: string }
                address: { type: string }
                identity_number: { type: string }
                tax_code: { type: string }
                bank_account_number: { type: string }
                bank_name: { type: string }
                department_id: { type: string, format: uuid }
                position_id: { type: string, format: uuid }
                job_level_id: { type: string, format: uuid }
                direct_manager_id: { type: string, format: uuid }
                joined_date: { type: string, format: date }
                probation_end_date: { type: string, format: date }
                employment_status: { type: string }
                employee_type: { type: string }
                work_location: { type: string }
                contract: { type: object }
                create_user_account: { type: boolean }
                user: { type: object }
                file_ids: { type: array, items: { type: string, format: uuid } }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

