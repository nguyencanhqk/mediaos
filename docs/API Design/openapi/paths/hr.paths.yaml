      tags: [HR - Employees]
      summary: Tạo nhân viên mới
      operationId: hrCreateEmployee
      x-required-permission: HR.EMPLOYEE.CREATE
      x-allowed-roles: [Super Admin, Company Admin, HR]
      x-data-scope: [Company, System]
