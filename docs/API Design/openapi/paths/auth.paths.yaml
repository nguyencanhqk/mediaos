  # =========================================================================
  # AUTH — User management API (/auth/users*)
  # =========================================================================
  /api/v1/auth/users:
    get:
      tags: [Auth - Users]
      summary: Lấy danh sách user
      operationId: authListUsers
      x-required-permission: AUTH.USER.VIEW
      x-allowed-roles: [Super Admin, Company Admin, HR]
      x-data-scope: [Company, System]
      x-idempotency: "No"
      x-audit-log: none
      x-notification-event: null
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
        - { name: status, in: query, required: false, schema: { type: string, enum: [Active, Locked, Inactive, Pending Activation] } }
        - { name: role_code, in: query, required: false, schema: { type: string } }
        - { name: department_id, in: query, required: false, schema: { type: string, format: uuid } }
      responses:
        '200': { $ref: '#/components/responses/SuccessList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
    post:
      tags: [Auth - Users]
      summary: Tạo user mới
      operationId: authCreateUser
      x-required-permission: AUTH.USER.CREATE
      x-allowed-roles: [Super Admin, Company Admin, HR]
      x-data-scope: [Company, System]
      x-idempotency: "Required"
      x-audit-log: always
      x-notification-event: AUTH.USER_CREATED
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, display_name]
              properties:
                email: { type: string, format: email }
                display_name: { type: string, maxLength: 255 }
                employee_id: { type: string, format: uuid }
                role_ids: { type: array, items: { type: string, format: uuid } }
                status: { type: string, enum: [Pending Activation, Active, Inactive] }
                must_change_password: { type: boolean }
                send_activation_email: { type: boolean }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/ServerError' }
