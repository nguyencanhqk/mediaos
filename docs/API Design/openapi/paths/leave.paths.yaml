      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_code, company_id, leave_request_id, employee_id, days]
              properties:
                event_code: { type: string, enum: [LEAVE_REQUEST_APPROVED, LEAVE_REQUEST_CANCELLED, LEAVE_REQUEST_REVOKED] }
                company_id: { type: string, format: uuid }
                leave_request_id: { type: string, format: uuid }
                employee_id: { type: string, format: uuid }
                request_code: { type: string }
                days:
                  type: array
                  items:
                    type: object
                    properties:
                      date: { type: string, format: date }
                      duration_type: { type: string, enum: [FullDay, HalfDay, Hourly] }
                      leave_days: { type: number }
                      leave_hours: { type: number }
                      start_time: { type: string, nullable: true }
                      end_time: { type: string, nullable: true }
                correlation_id: { type: string }
