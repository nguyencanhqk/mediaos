    post:
      tags: [Leave - Internal]
      summary: Đồng bộ đơn nghỉ Approved/Cancelled/Revoked sang ATT
      operationId: leaveInternalAttendanceSync
      x-required-permission: null
      x-allowed-roles: [System]
