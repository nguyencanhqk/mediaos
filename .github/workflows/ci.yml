name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Migrate · RLS Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mediaos
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mediaos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediaos -d mediaos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # DB ephemeral của CI — KHÔNG phải secret thật.
      # DIRECT = superuser (migration + bootstrap role + seed test). app/worker = role tách quyền (G2-1):
      # test integration kết nối DATABASE_URL = mediaos_app (NOSUPERUSER, NOBYPASSRLS) ⇒ RLS ĐƯỢC ÉP thật.
      # CI không có PgBouncer ⇒ app trỏ thẳng :5432 (RLS vẫn ép trên direct conn). Pass-through PgBouncer
      # kiểm bằng docker (xem docker-compose), không ở CI.
      DATABASE_DIRECT_URL: postgres://mediaos:postgres@localhost:5432/mediaos
      DATABASE_URL: postgres://mediaos_app:ci_app_pw@localhost:5432/mediaos
      DATABASE_WORKER_URL: postgres://mediaos_worker:ci_worker_pw@localhost:5432/mediaos
      # PGBOUNCER_URL → mediaos_app QUA PgBouncer transaction-mode (:6432, khởi động ở step bên dưới sau khi
      # role có mật khẩu + userlist.txt). Bật pgbouncer-tenant-isolation.int-spec (GX-4): chứng minh tenant
      # isolation giữ vững khi connection bị TÁI DÙNG qua pooler. KHÔNG set ⇒ test đó tự skip (mất gate qua-pool).
      PGBOUNCER_URL: postgres://mediaos_app:ci_app_pw@localhost:6432/mediaos
      VALKEY_URL: redis://localhost:6379
      # Mật khẩu role (ephemeral CI). Phải KHỚP mật khẩu trong URL ở trên.
      APP_DB_PASSWORD: ci_app_pw
      WORKER_DB_PASSWORD: ci_worker_pw
      PGBOUNCER_AUTH_PASSWORD: ci_pgb_pw
      # JWT secret ephemeral cho test auth (G2-6).
      JWT_SECRET: ci-only-jwt-secret-0123456789abcdef

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (contracts + apps)
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Migration TRƯỚC test: tạo role + bảng + RLS policy + FORCE (GX-4 — policy+FORCE cùng CREATE).
      - name: Apply migrations (real Postgres)
        run: pnpm --filter @mediaos/api db:migrate

      # Gate journal forward-only (S0-CI-1): migrate DB rỗng → kiểm BẤT BIẾN NỘI TẠI của
      # migrations/meta/_journal.json (idx liên tục từ 0/no-gap, tag duy nhất/no-dup, head=entries[last].idx
      # ĐỌC ĐỘNG, số .sql áp = entries.length). KHÔNG so literal idx chép tay. Chạy SAU migrate, TRƯỚC roles.
      - name: Migration check (db:check)
        run: pnpm --filter @mediaos/api db:check

      # Gán mật khẩu cho mediaos_app/worker/pgbouncer_auth (tách secret khỏi migration) → app kết nối được.
      # BƯỚC NÀY cũng sinh .secrets/pgbouncer/userlist.txt (hash SCRAM của pgbouncer_auth) cho auth_query.
      - name: Setup DB role passwords
        run: pnpm db:setup-roles
        env:
          PGBOUNCER_USERLIST_PATH: ${{ github.workspace }}/.secrets/pgbouncer/userlist.txt

      # PgBouncer transaction-mode (GX-4): khởi động SAU setup-roles (cần userlist.txt + role có mật khẩu).
      # --network host → reach Postgres service ở localhost:5432 và publish :6432 trên host runner.
      # DB_USER cố tình BỎ TRỐNG → pass-through user (mediaos_app) suốt tới Postgres ⇒ RLS ép thật (KHÔNG
      # gộp về 1 server-user = bypass). transaction-mode = set_config('app.current_company_id',$1,true) LOCAL
      # phải reset khi commit ⇒ test chứng minh không rò ngữ cảnh qua pooled conn tái dùng.
      - name: Start PgBouncer (transaction-mode, pass-through user)
        run: |
          docker run -d --name mediaos-pgbouncer --network host \
            -e DB_HOST=localhost -e DB_PORT=5432 -e DB_NAME=mediaos \
            -e POOL_MODE=transaction \
            -e AUTH_TYPE=scram-sha-256 -e AUTH_USER=pgbouncer_auth \
            -e "AUTH_QUERY=SELECT username, password FROM pgbouncer.get_auth(\$1)" \
            -e LISTEN_PORT=6432 \
            -e MAX_CLIENT_CONN=1000 -e DEFAULT_POOL_SIZE=25 \
            -e IGNORE_STARTUP_PARAMETERS=extra_float_digits,options \
            -v "${{ github.workspace }}/.secrets/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro" \
            edoburu/pgbouncer:latest
          # Chờ pooler nhận kết nối (tránh đỏ giả vì race khởi động).
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 6432 -U mediaos_app -d mediaos >/dev/null 2>&1; then
              echo "pgbouncer ready"; break
            fi
            sleep 1
          done

      # Test gồm integration RLS/isolation/outbox/auth chạy THẬT (DATABASE_URL = mediaos_app).
      # Đây là gate "không rò chéo tenant" của cả dự án (G2-5) + gate qua-pool (PGBOUNCER_URL, GX-4).
      - name: Test (unit + integration RLS/auth)
        run: pnpm test

      # DEFER → S0-CI-2: secret-scan (gitleaks) + dependency-scan (pnpm audit) — ĐÃ hiện thực ở security.yml
      # (WO S0-CI-2); KHÔNG bỏ qua silently (DEVOPS-02 §9.2/§11/§17.2). Đặt ở workflow riêng để tránh trùng lặp.
