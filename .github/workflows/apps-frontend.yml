# Per-app frontend CI (build độc lập từng SPA) — runbook docs/ops/fs5-cutover-runbook.md §6.
#
# Mỗi app (auth/console) build & deploy RIÊNG: đổi 1 app KHÔNG rebuild cả monorepo.
# `changes` job dùng dorny/paths-filter để chỉ chạy app có path đổi (hoặc packages dùng chung / lockfile đổi).
#
# QUAN HỆ với ci.yml: ci.yml = cổng tích hợp CROSS-CUTTING (RLS qua PgBouncer, build toàn workspace) chạy
# trên MỌI thay đổi. File này = pipeline build/deploy ĐỘC LẬP theo app (path-filtered). Hai cái bổ trợ nhau.
#
# Deploy (S5-DEVOPS-1): job `deploy` cuối file — push master → Cloudflare Pages, gate bằng repo var
#   DEPLOY_FE_ENABLED=='true' (CI không đỏ khi chưa nạp secret) + environment `production`
#   (secret CLOUDFLARE_API_TOKEN scope Pages:Edit — owner tạo; var CLOUDFLARE_ACCOUNT_ID đã provision).
#   VITE_* là biến BUILD-TIME công khai (nhúng vào client bundle) → dùng GitHub Actions `vars` (KHÔNG `secrets`).
#   Đặt repo/env variable `PROD_DOMAIN=funtimemediacorp.com` để nhúng đúng origin; vắng → default funtimemediacorp.com.

name: Apps — Frontend CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: apps-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Phát hiện app nào đổi (path-filter) ───────────────────────────────────
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      # `changes` = JSON array các filter khớp (vd '["web","auth"]'); rỗng → '[]'.
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Mỗi app rebuild khi: source app đổi, HOẶC package dùng chung đổi, HOẶC lockfile đổi.
          filters: |
            auth:    [ 'apps/auth/**',    'packages/**', 'pnpm-lock.yaml' ]
            console: [ 'apps/console/**', 'packages/**', 'pnpm-lock.yaml' ]
            app:     [ 'apps/app/**',     'packages/**', 'pnpm-lock.yaml' ]

  # ── Build/typecheck/test từng app đổi (matrix) ────────────────────────────
  build:
    name: Build ${{ matrix.app }}
    needs: changes
    # Bỏ qua khi không app nào đổi (matrix rỗng → lỗi); chỉ chạy khi có ít nhất 1 app.
    if: ${{ needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Package dùng chung phải build TRƯỚC (apps tiêu thụ dist): contracts → web-core → ui (runbook §6.2).
      - name: Build shared packages
        run: pnpm --filter @mediaos/contracts --filter @mediaos/web-core --filter @mediaos/ui build

      - name: Typecheck
        run: pnpm --filter @mediaos/${{ matrix.app }} typecheck

      # Test (vitest) chạy với env DEV mặc định — TUYỆT ĐỐI KHÔNG inject VITE_* prod TRƯỚC bước này: login.spec
      # assert DEFAULT_APP_URL dev ('http://web.localhost:5273', config.ts fallback). Nếu set VITE_DEFAULT_APP_URL
      # prod trước test → import.meta.env override → assertion lệch → đỏ-giả. Vì vậy Resolve VITE_* nằm SAU Test.
      - name: Test
        run: pnpm --filter @mediaos/${{ matrix.app }} test

      # VITE_* prod nhúng lúc BUILD (build-time, KHÔNG runtime) — resolve SAU Test, chỉ phục vụ Build.
      # Mỗi app chỉ set biến nó thực sự đọc. DOMAIN từ repo var PROD_DOMAIN (vắng → placeholder để build xanh ở CI).
      - name: Resolve build-time VITE_* env for ${{ matrix.app }}
        run: |
          DOMAIN="${{ vars.PROD_DOMAIN || 'funtimemediacorp.com' }}"
          AUTH_URL="https://auth.${DOMAIN}"
          echo "VITE_API_URL=https://api.${DOMAIN}/api/v1" >> "$GITHUB_ENV"
          case "${{ matrix.app }}" in
            app)
              # vỏ nghiệp vụ ở apex; cần auth app để bounce khi mất phiên (main.tsx đọc VITE_AUTH_APP_URL).
              # (S5-DEVOPS-1: trước đây case này THIẾU → bundle CI không bounce được — khớp lại 06-deploy-pages.ps1.)
              echo "VITE_AUTH_APP_URL=${AUTH_URL}"          >> "$GITHUB_ENV"
              ;;
            auth)
              # bounce về launcher (root domain) khi ?redirect vắng/không hợp lệ
              echo "VITE_DEFAULT_APP_URL=https://${DOMAIN}"  >> "$GITHUB_ENV"
              # slug công ty CỐ ĐỊNH lúc build (form prod không có ô nhập) — PHẢI khớp company admin prod
              # (06-deploy-pages.ps1 -CompanySlug). Đổi qua repo var PROD_COMPANY_SLUG.
              echo "VITE_COMPANY_SLUG=${{ vars.PROD_COMPANY_SLUG || 'funtime' }}" >> "$GITHUB_ENV"
              ;;
            console)
              echo "VITE_AUTH_APP_URL=${AUTH_URL}"          >> "$GITHUB_ENV"
              ;;
          esac

      - name: Build
        run: pnpm --filter @mediaos/${{ matrix.app }} build

      # Dist đẩy lên artifact cho job `deploy` (job riêng để gắn environment: production — secrets/branch
      # policy tách khỏi build PR). retention ngắn: chỉ là cầu build→deploy trong cùng run.
      - name: Upload dist (cho job deploy)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.app }}
          path: apps/${{ matrix.app }}/dist
          retention-days: 3

  # ── Deploy → Cloudflare Pages (S5-DEVOPS-1) ────────────────────────────────
  # CHỈ push master + repo var DEPLOY_FE_ENABLED == 'true' (gate bằng var để CI KHÔNG đỏ khi chưa nạp
  # secret — owner bật sau khi tạo token). Cần (một lần, owner):
  #   1. Cloudflare dashboard → API token scope Pages:Edit → `gh secret set CLOUDFLARE_API_TOKEN --env production`
  #   2. `gh variable set DEPLOY_FE_ENABLED --body true`
  # Environment `production` (branch policy: protected branches) + var CLOUDFLARE_ACCOUNT_ID đã provision sẵn.
  # Project name: app → `web-mediaos` (project ĐANG giữ apex — deploy vào đó để domain TỰ cập nhật);
  # auth/console → `<app>-mediaos` (khớp 06-deploy-pages.ps1 — KHÔNG đổi tên kẻo lệch domain đã gắn).
  deploy:
    name: Deploy ${{ matrix.app }} → Cloudflare Pages
    needs: [changes, build]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/master' &&
      vars.DEPLOY_FE_ENABLED == 'true' &&
      needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != ''
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.app }}
          path: dist

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }} # scope: Pages:Edit (environment secret)
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }} # environment variable (không phải secret)
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Thiếu environment secret CLOUDFLARE_API_TOKEN (Pages:Edit) — tạo ở CF dashboard rồi 'gh secret set CLOUDFLARE_API_TOKEN --env production'." >&2
            exit 1
          fi
          case "${{ matrix.app }}" in
            app) PROJECT="web-mediaos" ;;
            *)   PROJECT="${{ matrix.app }}-mediaos" ;;
          esac
          echo "deploy dist → $PROJECT"
          npx wrangler@3 pages deploy dist --project-name "$PROJECT" --branch main
