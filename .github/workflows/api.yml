# Per-app API CI (NestJS) — build & test độc lập + migrate ở release step. Runbook §6.
#
# Chạy khi apps/api (gồm migrations) HOẶC packages/contracts HOẶC lockfile đổi (path-filter).
# Build + test trên Postgres EPHEMERAL (service container, DB của CI — KHÔNG phải secret thật).
# `release` (chỉ push master) = nơi chạy `pnpm db:migrate` lên DB PROD + deploy — PLACEHOLDER tới khi
# chốt host/secret. KHÔNG hard-code DSN/secret prod vào repo.
#
# QUAN HỆ với ci.yml: ci.yml giữ cổng tích hợp CROSS-CUTTING gồm gate RLS-QUA-PGBOUNCER (GX-4) mà file này
# CỐ Ý bỏ (lean, không dựng pgbouncer container) → spec pgbouncer tự skip ở đây (PGBOUNCER_URL vắng).

name: API — CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect API changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/contracts/**'
              - 'pnpm-lock.yaml'
              # S5-DEVOPS-1: đổi chính workflow này hoặc script migrate-verify cũng phải chạy lại job
              # (nếu không, step "Migrate-from-empty verify" đổi mà không bao giờ được thực thi ở PR đó).
              - '.github/workflows/api.yml'
              - 'scripts/migrate-verify-ephemeral.sh'

  build-test:
    name: Build · Typecheck · Migrate · Test
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mediaos
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mediaos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mediaos -d mediaos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # MinIO KHÔNG dựng ở đây — xem step "Start MinIO". Service container của GitHub Actions không override
      # được `command`, mà `minio/minio` đòi đối số `server /data`. (`bitnami/minio` tự chạy server nhưng
      # Bitnami đã dời image/tag ⇒ `manifest unknown`.) Dùng `docker run` ở step cho chắc.

    env:
      # DB ephemeral CI — KHÔNG phải secret thật. DIRECT = superuser (migrate + bootstrap role + seed test).
      # app/worker = role tách quyền (G2-1): test integration nối DATABASE_URL = mediaos_app (NOBYPASSRLS)
      # ⇒ RLS ĐƯỢC ÉP thật trên direct conn :5432 (không có PgBouncer ở job lean này).
      DATABASE_DIRECT_URL: postgres://mediaos:postgres@localhost:5432/mediaos
      DATABASE_URL: postgres://mediaos_app:ci_app_pw@localhost:5432/mediaos
      DATABASE_WORKER_URL: postgres://mediaos_worker:ci_worker_pw@localhost:5432/mediaos
      VALKEY_URL: redis://localhost:6379
      APP_DB_PASSWORD: ci_app_pw
      WORKER_DB_PASSWORD: ci_worker_pw
      PGBOUNCER_AUTH_PASSWORD: ci_pgb_pw
      JWT_SECRET: ci-only-jwt-secret-0123456789abcdef
      # Scheduler tắt trong CI test (NODE_ENV=test) — vitest set NODE_ENV=test; double-guard kill-switch off.
      WORKERS_SCHEDULER_ENABLED: "false"
      # Test crypto/2FA (LocalKekProvider) cần file KEK 32-byte tại path này. CI sinh KEK EPHEMERAL ở step dưới
      # (KHÔNG phải secret thật — prod dùng Vault transit, ADR-0004). Đặt env để cả gen-step lẫn test cùng đọc.
      KMS_LOCAL_KEK_PATH: ${{ github.workspace }}/.secrets/local-kek.bin
      # Object storage ephemeral (service `minio` ở trên). Trước 2026-07-10 CI KHÔNG set S3_* nên
      # employee-file.int-spec (download → 302 signed URL) ném StorageNotConfiguredError — nhưng không ai
      # thấy vì spec đó bị `skipIf` bỏ qua khi thiếu LANE_DB. Bật LANE_DB thì phải cấp storage thật.
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: ci_minio_user
      S3_SECRET_KEY: ci_minio_password
      S3_BUCKET: mediaos-test
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # contracts (DTO nguồn sự thật) phải build trước typecheck/test của api.
      - name: Build contracts
        run: pnpm --filter @mediaos/contracts build

      - name: Typecheck
        run: pnpm --filter @mediaos/api typecheck

      # Migration TRƯỚC test: tạo bảng + RLS policy + FORCE (policy+FORCE cùng CREATE).
      - name: Apply migrations (ephemeral Postgres)
        run: pnpm --filter @mediaos/api db:migrate

      # Gate journal forward-only (S0-CI-1): migrate DB rỗng → kiểm BẤT BIẾN NỘI TẠI của
      # migrations/meta/_journal.json (idx liên tục từ 0/no-gap, tag duy nhất/no-dup, head=entries[last].idx
      # ĐỌC ĐỘNG, số .sql áp = entries.length). KHÔNG so literal idx chép tay. Chạy SAU migrate, TRƯỚC roles.
      - name: Migration check (db:check)
        run: pnpm --filter @mediaos/api db:check

      # S5-DEVOPS-1 — chứng minh migrate-from-empty trên DB RIÊNG ephemeral (mediaos_migverify_<ts>_<pid>),
      # ĐỘC LẬP với DB test `mediaos` của job (DB đó còn bị test ghi bẩn — không phải bằng chứng from-empty
      # thuần). Superuser CI `mediaos` của service container có quyền CREATE DATABASE — ZERO secret prod.
      # `--self-test` chạy TRƯỚC: khoá GUARD refuse-drop (blocklist mediaos/mediaos_dev, chỉ cho
      # ^mediaos_migverify_) ngay trong CI. Script tự DROP DB ephemeral ở trap EXIT.
      - name: Migrate-from-empty verify (dedicated ephemeral DB)
        run: |
          bash scripts/migrate-verify-ephemeral.sh --self-test
          bash scripts/migrate-verify-ephemeral.sh

      # Gán mật khẩu mediaos_app/worker (tách secret khỏi migration) → app role nối được, RLS ép thật.
      - name: Setup DB role passwords
        run: pnpm db:setup-roles

      # Crypto tests (secret-encryption · 2FA enroll) cần KEK 32-byte tại KMS_LOCAL_KEK_PATH (LocalKekProvider,
      # dev-only). Sinh KEK NGẪU NHIÊN ephemeral mỗi run — KHÔNG phải secret thật (prod = Vault transit, ADR-0004).
      - name: Generate ephemeral dev KEK (crypto tests)
        run: |
          mkdir -p "$(dirname "$KMS_LOCAL_KEK_PATH")"
          node -e "require('fs').writeFileSync(process.env.KMS_LOCAL_KEK_PATH, require('crypto').randomBytes(32))"

      # Object storage ephemeral. Chạy bằng `docker run` (KHÔNG service container) vì service container không
      # override được `command`, mà `minio/minio` đòi `server /data`. Credential ephemeral — KHÔNG secret thật.
      #
      # Presign (getSignedUrl) là tính toán CỤC BỘ, không gọi mạng — nên riêng test "download → 302" chỉ cần
      # env S3_*. Nhưng spec khác có thể gọi putObject/headObject thật, nên vẫn dựng MinIO + tạo bucket.
      - name: Start MinIO (object storage cho integration test)
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER="$S3_ACCESS_KEY" \
            -e MINIO_ROOT_PASSWORD="$S3_SECRET_KEY" \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then echo "minio ready"; break; fi
            if [ "$i" = "30" ]; then echo "MinIO không lên sau 60s" >&2; docker logs minio >&2; exit 1; fi
            sleep 2
          done
          docker run --rm --network host --entrypoint sh minio/mc:latest -c "\
            mc alias set local http://localhost:9000 '$S3_ACCESS_KEY' '$S3_SECRET_KEY' && \
            mc mb --ignore-existing local/$S3_BUCKET"

      # ⚠ LANE_DB BẮT BUỘC ở step này — nếu thiếu, CI XANH MÀ KHÔNG CHẠY GÌ.
      #
      # 70/128 file int-spec gate `runIsolatedDb = hasDb && !!process.env.LANE_DB` rồi `describe.skipIf(...)`.
      # Trước 2026-07-10 step này KHÔNG set LANE_DB ⇒ ~68 file (toàn bộ suite deny-path / IDOR / cross-tenant)
      # bị SKIP IM LẶNG. Hệ quả đã đo được: permission-rule-apply.int-spec.ts ĐỎ 2 test từ PR #123 mà không ai
      # thấy, vì nó chưa từng chạy ở đâu — CI skip, và `check.sh` cũng không set LANE_DB.
      #
      # LANE_DB=mediaos = CHÍNH DB ephemeral của job này (đã migrate 0000→head ở step "Apply migrations" +
      # db:check pass). Đây là DB CÔ LẬP/EPHEMERAL của CI, KHÔNG phải DB dev chung ⇒ KHÔNG vi phạm policy
      # memory integration-test-LANE_DB-gate (gate đó chống .env trỏ DB dev chung làm hasDb=true → đỏ-giả).
      # Precedence vitest.config laneDbEnv(): DATABASE_URL/DIRECT explicit (env job) > LANE_DB > fallback —
      # nên LANE_DB CHỈ bật gate, KHÔNG đổi connection string (vẫn trỏ DB ephemeral đã migrate tới head).
      #
      # Đã đo trước khi bật (nhánh feat/s4-noti-dash-wave, DB cô lập chain 0000→0483):
      #   LANE_DB=<db> npx vitest run test/integration → 121 file pass · 1 file fail · 2126 test pass
      # File fail duy nhất = permission-rule-apply (201 vs 200) → đã sửa bằng @HttpCode(200) trong PR này.
      - name: Test (unit + integration RLS/auth)
        env:
          LANE_DB: mediaos
        run: pnpm --filter @mediaos/api test

      # ── S2-AUTH-SEED-1 / FIX-SEED1-D — canary tường minh cho 2 spec SEED-1 ──────────
      # Step "Test" phía trên GIỜ đã bao trùm 2 file này (LANE_DB đã bật). Giữ step riêng làm check có TÊN
      # trong danh sách PR: nếu ai lỡ gỡ LANE_DB khỏi step trên, step này vẫn đỏ và chỉ đúng nguyên nhân.
      # Dùng `exec vitest run <file>` (KHÔNG `test -- <file>`): qua `pnpm run test` thì `--` không truyền
      # đúng filter cho vitest (vitest coi `--` là token positional → chạy CẢ suite). `exec` gọi thẳng vitest
      # ⇒ 2 path là positional filter THẬT → đúng 75 test (66 canonical-roles + 9 super-admin-bootstrap).
      - name: Integration (SEED-1 isolated-DB suites)
        env:
          LANE_DB: mediaos
        run: >-
          pnpm --filter @mediaos/api exec vitest run
          test/integration/auth-seed-canonical-roles.int-spec.ts
          test/integration/super-admin-bootstrap.int-spec.ts

      # DEFER → S0-CI-2: secret-scan (gitleaks) + dependency-scan (pnpm audit) — ĐÃ hiện thực ở security.yml
      # (WO S0-CI-2); KHÔNG bỏ qua silently (DEVOPS-02 §9.2/§11/§17.2). Đặt ở workflow riêng để tránh trùng lặp.

      - name: Build (NestJS)
        run: pnpm --filter @mediaos/api build

  # ── Release BE (QUYẾT ĐỊNH S5-DEVOPS-1 2026-07-12 — machine-local by design, KHÔNG placeholder nữa) ──
  # PROD API + Postgres sống TRÊN MÁY WINDOWS của owner (NSSM service + docker Postgres localhost, chỉ lộ
  # HTTP qua cloudflared tunnel). Hosted runner KHÔNG với tới DB/service ⇒ 2 lựa chọn đã cân nhắc:
  #   (a) self-hosted runner trên máy prod — TỪ CHỐI: repo PUBLIC, workflow từ fork PR có thể nhắm
  #       runs-on: self-hosted ⇒ rủi ro chạy code lạ trên máy prod (GitHub docs khuyến cáo thẳng).
  #   (b) BE deploy = 1 lệnh tại máy (`m deploy-api` = build + cài/restart NSSM; migrate = `m migrate`
  #       sau khi `m prod-env`) — CHỌN: đơn giản, kiểm soát, khớp topology. FE thì TỰ ĐỘNG qua Pages
  #       (job deploy trong apps-frontend.yml).
  # Job này giữ vai trò THÔNG BÁO sau khi build-test xanh trên master: nhắc thứ tự release BE tay.
  # Đổi quyết định (a)↔(b) = sửa chỗ này + docs/plans/S5-DEVOPS-1.md (runbook §d).
  release:
    name: Release notice (BE deploy = machine-local)
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: BE release checklist (manual, on prod host)
        run: |
          echo "::notice::BE release (chạy TRÊN máy prod, thứ tự): 1) git pull master  2) m prod-env  3) m migrate (forward-only, expand-contract)  4) m deploy-api (build + restart NSSM)  5) check https://api.<domain>/api/v1/health. FE đã tự deploy qua job 'Deploy → Cloudflare Pages' (apps-frontend.yml) khi DEPLOY_FE_ENABLED=true."
