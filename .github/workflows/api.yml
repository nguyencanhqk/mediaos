      #     DATABASE_DIRECT_URL: ${{ secrets.PROD_DATABASE_DIRECT_URL }}   # owner/superuser direct
      # - name: Deploy API
      #   run: ./scripts/deploy-api.sh
      #   env:
      #     DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      - name: Release placeholder
        run: |
          echo "TODO(ops) run pnpm db:migrate against prod DB + deploy NestJS once host/secrets are set (runbook section 9)."
