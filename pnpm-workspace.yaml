packages:
  - "apps/*"
  - "packages/*"
  # apps/lms = LMS nhập tại chỗ, workspace RIÊNG (Next.js+SQLite, pnpm-lock riêng) — loại khỏi
  # workspace MediaOS để root install/turbo KHÔNG đụng tới (tránh xung đột deps + build).
  - "!apps/lms"

# Pin React TYPES về một phiên bản toàn monorepo — chặn @types/react dedupe skew
# (ReactNode/ReactPortal mismatch 19.0.14 vs 19.2.16). Khớp peerDeps packages/{ui,web-core}.
# Chỉ pin types (KHÔNG pin react/react-dom runtime).
overrides:
  "@types/react": "19.2.16"
  "@types/react-dom": "19.2.3"
  # S0-CI-2 dependency-scan: ép phiên bản ĐÃ VÁ cho dep transitive có advisory high-sev (pnpm audit gate).
  # Range-scoped (chỉ override dải lỗ hổng) — KHÔNG đụng major khác. ws/form-data transitive; multer cũng
  # tới gián tiếp qua @nestjs/platform-express nên direct bump apps/api chưa đủ → cần override.
  "ws@>=8.0.0 <8.21.0": "^8.21.0"
  "form-data@>=4.0.0 <4.0.6": "^4.0.6"
  "multer@>=1.0.0 <2.2.0": "^2.2.0"
  # 2026-07-22 — vá advisory HIGH (cổng CI = `pnpm audit --audit-level high`). Cả 6 đều là dep BẮC CẦU
  # của tooling build/test (eslint · vitest · @nestjs/cli · drizzle-kit · exceljs), KHÔNG phải dep
  # runtime của API. Dùng override thay vì bump devDep gốc để giữ blast radius nhỏ: `pnpm audit
  # --fix=update` kéo theo TypeScript 5.7→5.9 + prettier + eslint + turbo — thay đổi toolchain lớn
  # không cần thiết cho một bản vá bảo mật.
  # ⚠️ Advisory moderate/low còn lại (esbuild · uuid · body-parser) CỐ Ý KHÔNG override: dưới ngưỡng
  # cổng, và bản pnpm đề xuất cho esbuild (0.24.3) CHƯA TỪNG phát hành ⇒ override làm GÃY install của
  # drizzle-kit (ERR_PNPM_NO_MATCHING_VERSION). Rà lại khi nâng drizzle-kit/vitest.
  "brace-expansion@<1.1.16": "^1.1.16"
  "brace-expansion@>=2.0.0 <2.1.2": "^2.1.2"
  "brace-expansion@>=3.0.0 <5.0.7": "^5.0.7"
  "fast-uri@>=3.0.0 <=3.1.3": "^3.1.4"
  "js-yaml@>=4.0.0 <4.3.0": "^4.3.0"
  "shell-quote@<=1.8.4": "^1.8.5"

# Cho phép chạy postinstall của các gói cần binary native (pnpm 10+ chặn mặc định).
allowBuilds:
  esbuild: true
  "@swc/core": true
  "@nestjs/core": true
  # S2-FND-CONTRACT-1: @scarf/scarf kéo theo qua @nestjs/swagger→swagger-ui-dist. Chỉ là analytics
  # install-ping (KHÔNG cần build native) → false = KHÔNG chạy postinstall + tắt gate ERR_PNPM_IGNORED_BUILDS.
  "@scarf/scarf": false

# Repo đặt minimumReleaseAge (chặn cài gói vừa phát hành — phòng supply-chain). Bản VÁ bảo mật ở
# `overrides` bên trên phải được miễn trừ ở đây, nếu không install sẽ từ chối chính bản đã vá.
minimumReleaseAgeExclude:
  - brace-expansion@1.1.16
  - brace-expansion@2.1.2
  - brace-expansion@5.0.7
  - fast-uri@3.1.4
  - js-yaml@4.3.0
  - shell-quote@1.8.5
