packages:
  - "apps/*"
  - "packages/*"

# Pin React TYPES về một phiên bản toàn monorepo — chặn @types/react dedupe skew
# (ReactNode/ReactPortal mismatch 19.0.14 vs 19.2.16; bài học apps/admin). Khớp peerDeps
# packages/{ui,web-core}. Chỉ pin types (KHÔNG pin react/react-dom runtime — giữ Expo/mobile).
overrides:
  "@types/react": "19.2.16"
  "@types/react-dom": "19.2.3"

# Cho phép chạy postinstall của các gói cần binary native (pnpm 10+ chặn mặc định).
allowBuilds:
  esbuild: true
  "@swc/core": true
  "@nestjs/core": true
  # Expo native build scripts (G15 mobile)
  expo: true
  "expo-modules-core": true
  "expo-secure-store": true
  "expo-constants": true
  # Pulled in transitively by eslint-config-expo's import resolver; ships prebuilt binaries, so its
  # build script is not needed — disabled to keep installs deterministic and warning-free.
  unrs-resolver: false
