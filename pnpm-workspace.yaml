packages:
  - "apps/*"
  - "packages/*"

# Cho phép chạy postinstall của các gói cần binary native (pnpm 10+ chặn mặc định).
allowBuilds:
  esbuild: true
  "@swc/core": true
  "@nestjs/core": true
  # Expo native build scripts (G15 mobile)
  expo: true
  "expo-modules-core": true
  "expo-secure-store": true
  "expo-constants": true
  # Pulled in transitively by eslint-config-expo's import resolver; ships prebuilt binaries, so its
  # build script is not needed — disabled to keep installs deterministic and warning-free.
  unrs-resolver: false
