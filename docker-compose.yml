# MediaOS — hạ tầng dev local (CLAUDE.md §4 · ADR-0003/0011/0013/0014).
# Dùng: `cp .env.example .env` rồi `docker compose up -d`.
# KHÔNG commit `.env` (đã gitignore). Mọi giá trị nhạy cảm chỉ ở `.env`.
#
# Service: postgres (RLS sẽ bật ở G2) · pgbouncer (transaction-mode cho set_config tenant)
#          · valkey (cache/queue/presence) · minio (object storage S3-compatible, artifact nhỏ).

name: mediaos

services:
  postgres:
    image: postgres:17-alpine
    container_name: mediaos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mediaos}
      # UTC-at-rest (ADR-0008): container chạy UTC, app quy đổi TZ.
      TZ: UTC
      PGTZ: UTC
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mediaos} -d ${POSTGRES_DB:-mediaos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # PgBouncer transaction-mode (ADR-0003): bắt buộc cho RLS — set_config('app.current_company_id',$1,true)
  # phải sống trong phạm vi transaction. App nghiệp vụ kết nối qua cổng 6432.
  # LISTEN/NOTIFY + BullMQ dùng pool DIRECT (postgres:5432), KHÔNG qua pgbouncer.
  #
  # 🔴 CHÍ MẠNG (G2-1): KHÔNG đặt DB_USER cố định. Nếu cố định = mọi server-conn chạy dưới 1 user
  # → RLS bị BYPASS → rò chéo tenant. Để TRỐNG DB_USER ⇒ PgBouncer GIỮ user client (mediaos_app)
  # suốt tới Postgres. auth_query (pgbouncer.get_auth, tạo ở migration 0001) lấy hash cho user bất kỳ.
  # userlist.txt (cho AUTH_USER=pgbouncer_auth) do scripts/setup-db-roles.mjs sinh ra — KHÔNG commit.
  # ⚠️ Cần `docker compose up` để kiểm chứng (auth_query pass-through chưa chạy thử trong môi trường này).
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: mediaos-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-mediaos}
      # DB_USER cố tình BỎ TRỐNG → pass-through user (xem ghi chú chí mạng ở trên).
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      AUTH_USER: pgbouncer_auth
      AUTH_QUERY: SELECT username, password FROM pgbouncer.get_auth($1)
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      # transaction-mode: server-side prepared statements không an toàn qua pool → tắt.
      # Drizzle/pg dùng simple/parametrized query nên OK.
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,options
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    volumes:
      # userlist.txt chứa hash của pgbouncer_auth — sinh bởi setup-db-roles.mjs, đã gitignore.
      - ./.secrets/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      # pg_isready qua port pooler — xác nhận PgBouncer nhận TCP và đang sẵn sàng (DEVOPS-03 §16).
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-mediaos} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy

  valkey:
    image: valkey/valkey:8-alpine
    container_name: mediaos-valkey
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: mediaos-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mediaos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  valkeydata:
  miniodata:
